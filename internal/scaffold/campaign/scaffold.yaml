# Campaign Scaffold Definition
# Tree format with mirror structure for camp CLI campaign initialization
_scaffold_version: "1.0.0"
_templates_dir: campaign/templates
_mirror_structure: true

_vars:
  campaign_name: ""
  campaign_id: ""
  campaign_type: "product"

# Root AGENTS.md (source of truth, CLAUDE.md symlinks to this)
AGENTS.md: AGENTS.md.tmpl

# .campaign directory structure
.campaign/:
  templates/:
    _empty: true
  agents/:
    _empty: true

# Project directories with OBEY.md files
projects/:
  _files:
    OBEY.md: ~

worktrees/:
  _files:
    OBEY.md: ~

ai_docs/:
  _files:
    OBEY.md: ~

docs/:
  _files:
    OBEY.md: ~

corpus/:
  _files:
    OBEY.md: ~

pipelines/:
  _files:
    OBEY.md: ~

code_reviews/:
  _files:
    OBEY.md: ~

# Intents directory structure
intents/:
  _files:
    OBEY.md: ~
  inbox/:
    _empty: true
  active/:
    _empty: true
  ready/:
    _empty: true
  done/:
    _empty: true
  killed/:
    _empty: true
