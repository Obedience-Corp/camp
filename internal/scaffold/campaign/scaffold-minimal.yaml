# Minimal Campaign Scaffold Definition
# Tree format with mirror structure for minimal camp CLI campaign initialization
_scaffold_version: "1.0.0"
_templates_dir: campaign/templates
_mirror_structure: true

_vars:
  campaign_name: ""
  campaign_id: ""
  campaign_type: "product"

# Root AGENTS.md (source of truth, CLAUDE.md symlinks to this)
AGENTS.md: AGENTS.md.tmpl

# .campaign directory structure
.campaign/:
  templates/:
    _empty: true
  agents/:
    _empty: true

# Only projects directory in minimal mode
projects/:
  _files:
    OBEY.md: ~

# Intents directory (minimal: only inbox)
intents/:
  _files:
    OBEY.md: ~
  inbox/:
    _empty: true
